# SW360 Users Backend Service
# Runs as a standalone Spring Boot application; the resource-server calls this
# service via REST instead of using the former Apache Thrift transport.

server.port=8090

# Disable the Spring Boot security auto-configuration — the users service is an
# internal backend reachable only within the deployment network.  End-user
# authentication is enforced by the resource-server layer.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# Allow Thrift-generated POJOs to be serialized / deserialized by Jackson.
# They carry internal fields (e.g. __isset_bitfield) that are not part of the
# public JSON API.
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.fail-on-empty-beans=false
