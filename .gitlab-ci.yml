image: debian:bookworm

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_MERGE_REQUEST_IID'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "mainct"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

stages:
  - renovate
  - build
  - images

include:
  - project: awesome-ci/templates
    ref: v3.0.0 # Insert desired version from https://code.siemens.com/awesome-ci/templates/-/releases
    file:
      - docker/build-docker-image.gitlab-ci.yml
      - general/use-proxy.gitlab-ci.yml
  - template: 'Workflows/MergeRequest-Pipelines.gitlab-ci.yml'
  - component: code.siemens.com/code-ops/ci-components/renovate@~latest
    inputs:
      stage: renovate
      autodiscover: true
      autodiscover_filter: 'sw360/sw360portal'
      rules_renovate_all:
        - if: $CI_PIPELINE_SOURCE == "schedule"
          when: always

variables:
  BUILD_ARTIFACT_ROOT: $CI_PROJECT_DIR/artifacts
  COUCHDB_USER: $COUCHDB_TEST_USER
  COUCHDB_PASSWORD: $COUCHDB_TEST_PWD
  DOCKER_PROXY_HOST: "$CODE_CR_PROXY_HOST"
  GRADLE_USER_HOME: $HOME/.gradle
  _JAVA_OPTIONS: -Djdk.net.URLClassPath.disableClassPathURLCheck=true -DSPDXParser.OnlyUseLocalLicenses=true
  # Use m2 repository in build dir for caching
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository -Xmx3072m"
  THRIFT_VERSION: "0.20.0"
  THRIFT_DIR: ${CI_PROJECT_DIR}/dist/thrift-${THRIFT_VERSION}
  KC_VERSION: "26.5.0"

################
# Helper anchors
################
.package_proxy: &setup_proxies
  - |
    mkdir -p /etc/apt/apt.conf.d
    printf "Acquire::http::proxy \"%s\";\nAcquire::https::proxy \"%s\";\n" \
      "${http_proxy}" "${https_proxy}" > /etc/apt/apt.conf.d/95proxy

  # setting remote repos url to download mvn packages
  - |
    printf '<settings>
        <mirrors>
          <mirror>
            <mirrorOf>central</mirrorOf>
            <name>remote-repos</name>
            <url>https://devops.bt.siemens.com/artifactory/maven2-all</url>
            <id>remote-repos</id>
          </mirror>
        </mirrors>
        <servers>
          <server>
          <id>gitlab-maven</id>
          <configuration>
            <httpHeaders>
              <property>
              <name>Job-Token</name>
              <value>%s</value>
              </property>
            </httpHeaders>
          </configuration>
          </server>
        </servers>
      </settings>' "${CI_JOB_TOKEN}" > ~/.m2/settings.xml

  # setting proxy for gradle, required to build thrift
  - |
    mkdir -p $GRADLE_USER_HOME
    printf "systemProp.http.proxyHost=%s
    systemProp.http.proxyPort=%s
    systemProp.http.nonProxyHosts='%s'
    systemProp.https.proxyHost=%s
    systemProp.https.proxyPort=%s
    " \
      "$CODE_PROXY_HOST" "$CODE_PROXY_PORT" "localhost|couchdb|*.siemens.com|*.siemens.de|*.siemens.co.in" \
      "$CODE_PROXY_HOST" "$CODE_PROXY_PORT" >> $GRADLE_USER_HOME/gradle.properties

.install_thrift: &install_thrift
  - |
    THRIFT_PLATFORM="$(uname -s | tr '[:upper:]' '[:lower:]')-$(uname -m)"
    THRIFT_BUILD_DIR="${CI_PROJECT_DIR}/dist/thrift-build-${THRIFT_VERSION}"
    THRIFT_SOURCE_ARCHIVE="${THRIFT_BUILD_DIR}/cache/thrift-${THRIFT_VERSION}.tar.gz"
    THRIFT_BINARY_ARCHIVE="${CI_PROJECT_DIR}/dist/thrift-${THRIFT_VERSION}-${THRIFT_PLATFORM}.tar.gz"
    THRIFT_BINARY_PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/thrift-binary/${THRIFT_VERSION}/$(basename "${THRIFT_BINARY_ARCHIVE}")"
    THRIFT_SOURCE_PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/thrift-source/${THRIFT_VERSION}/thrift-${THRIFT_VERSION}.tar.gz"
    if [ ! -x "$THRIFT_DIR/usr/local/bin/thrift" ]; then
      mkdir -p "$THRIFT_DIR" "${THRIFT_BUILD_DIR}/cache" "$CI_PROJECT_DIR/dist"
      if curl --fail --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --output "$THRIFT_BINARY_ARCHIVE" "$THRIFT_BINARY_PACKAGE_URL"; then
        tar -xzf "$THRIFT_BINARY_ARCHIVE" -C "$THRIFT_DIR"
      else
        curl --fail --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --output "$THRIFT_SOURCE_ARCHIVE" "$THRIFT_SOURCE_PACKAGE_URL" || true
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -yq build-essential libevent-dev libtool flex bison pkg-config libssl-dev git cmake sudo
        chmod +x third-party/thrift/install-thrift.sh
        BASEDIR="$THRIFT_BUILD_DIR" DESTDIR="$THRIFT_DIR" third-party/thrift/install-thrift.sh
        tar -czf "$THRIFT_BINARY_ARCHIVE" -C "$THRIFT_DIR" .
        curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$THRIFT_BINARY_ARCHIVE" "$THRIFT_BINARY_PACKAGE_URL" || true
        if [ -f "$THRIFT_SOURCE_ARCHIVE" ]; then
          curl --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file "$THRIFT_SOURCE_ARCHIVE" "$THRIFT_SOURCE_PACKAGE_URL" || true
        fi
      fi
    fi

renovate:
  before_script: []

build:
  stage: build
  image: maven:3-eclipse-temurin-21
  extends: .awesome-ci/use-proxy
  services:
    - couchdb:3.5
  before_script:
    - export _JAVA_OPTIONS="$_JAVA_OPTIONS -Dhttp.proxySet=true $JAVA_PROXY_OPTS"
    - export no_proxy="${no_proxy},couchdb"
    - mkdir -p ${BUILD_ARTIFACT_ROOT}/tomcat ${BUILD_ARTIFACT_ROOT}/keycloak /etc/sw360/ $CI_PROJECT_DIR/.m2/repository

    - *setup_proxies

    - cp ./build-configuration/test-resources/couchdb-test.properties /etc/sw360/
    - cp ./build-configuration/resources/orgmapping.properties /etc/sw360/
    - sed -i 's/^\(couchdb.url\s*=\).*/\1 '${COUCHDB_URL//\//\\/}'/' /etc/sw360/couchdb-test.properties
    - sed -i 's/^\(couchdb.user\s*=\).*/\1 '${COUCHDB_TEST_USER}'/' /etc/sw360/couchdb-test.properties
    - sed -i 's/^\(couchdb.password\s*=\).*/\1 '${COUCHDB_TEST_PWD}'/' /etc/sw360/couchdb-test.properties

    - *install_thrift

    # Check if CouchDB is running
    - curl -s $COUCHDB_URL/_up | grep -q '"status":"ok"'

    # Checkout branch for proper footer
    - git checkout ${CI_COMMIT_REF_NAME}

  script:
    # Build code and create artifacts
    - |
      export PATH=$PATH:$THRIFT_DIR/usr/local/bin
      if [ "$CI_COMMIT_REF_NAME" = "mainct" ]; then
        mvn_target="deploy"
      else
        mvn_target="install"
      fi
      mvn_cmd="mvn clean ${mvn_target} \
        --no-transfer-progress \
        -P deploy \
        -Dbase.deploy.dir=${BUILD_ARTIFACT_ROOT}/tomcat \
        -Dlistener.deploy.dir=${BUILD_ARTIFACT_ROOT}/keycloak \
        -DRunComponentVisibilityRestrictionTest=false \
        -DRunPrivateProjectAccessTest=false \
        -DRunRestForceUpdateTest=false \
        -fae \
        -Dmaven.plugin.validation=VERBOSE"
      eval $mvn_cmd
    - mkdir -p "${BUILD_ARTIFACT_ROOT}/keycloak/scripts/docker-config"
    - cp ./scripts/docker-config/docker-entrypoint-keycloak.sh "${BUILD_ARTIFACT_ROOT}/keycloak/scripts/docker-config/"
  cache:
    - key: maven
      paths:
        - $CI_PROJECT_DIR/.m2/repository
    - key: thrift-$THRIFT_VERSION
      paths:
        - $THRIFT_DIR
  artifacts:
    when: always
    reports:
      junit:
        - ./**/target/surefire-reports/TEST-*.xml
        - ./**/target/failsafe-reports/TEST-*.xml
    paths:
      - $BUILD_ARTIFACT_ROOT/keycloak

sw360-image:
  extends: .awesome-ci/build-docker-image
  stage: images
  variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE/sw360-new
    IMAGE_TAG: latest
    ADDITIONAL_IMAGE_TAGS: $CI_COMMIT_SHORT_SHA
    DOCKERFILE: $CI_PROJECT_DIR/Dockerfile.internal
    EXTRA_ARGUMENTS: --reproducible --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN
  needs:
    - job: build
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "mainct"

keycloak-image:
  extends: .awesome-ci/build-docker-image
  stage: images
  variables:
    IMAGE_NAME: $CI_REGISTRY_IMAGE/keycloak
    EXTRA_ARGUMENTS: --reproducible --build-arg KC_VERSION=$KC_VERSION
    IMAGE_TAG: $KC_VERSION
    ADDITIONAL_IMAGE_TAGS: $CI_COMMIT_SHORT_SHA
    BUILD_CONTEXT: $BUILD_ARTIFACT_ROOT/keycloak
    DOCKERFILE: $CI_PROJECT_DIR/Dockerfile.keycloak
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "mainct"
