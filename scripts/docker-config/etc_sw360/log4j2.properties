# SW360 Backend Log4j2 Configuration
# Loaded via: -Dlog4j2.configurationFile=/etc/sw360/log4j2.properties
# Hot-reload: changes are picked up every 30 seconds (monitorInterval).
name = sw360
status = warn
monitorInterval = 30
# --- Appenders ---
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n
# --- Root Logger ---
rootLogger.level = info
rootLogger.appenderRef.console.ref = Console
# --- SW360 base ---
logger.sw360.name = org.eclipse.sw360
logger.sw360.level = debug
logger.sw360.additivity = false
logger.sw360.appenderRef.console.ref = Console
# --- SVM / VM Components (set to debug to see URLs & processing) ---
logger.svm.name = org.eclipse.sw360.vmcomponents
logger.svm.level = debug
logger.svm.additivity = false
logger.svm.appenderRef.console.ref = Console
# --- Changelog (DatabaseHandlerUtil) ---
# To send changelog output to a file, uncomment the ChangeLogFile appender
# above and add a second appenderRef here:
#   logger.changelog.appenderRef.rolling.ref = ChangeLogFile
logger.changelog.name = org.eclipse.sw360.datahandler.db.DatabaseHandlerUtil
logger.changelog.level = info
logger.changelog.additivity = false
logger.changelog.appenderRef.console.ref = Console
# --- IBM Cloudant SDK (useful for CouchDB session debugging) ---
# Uncomment to debug CouchDB authentication/session issues:
#logger.cloudant.name = com.ibm.cloud.cloudant
#logger.cloudant.level = debug
#logger.cloudant.additivity = false
#logger.cloudant.appenderRef.console.ref = Console
