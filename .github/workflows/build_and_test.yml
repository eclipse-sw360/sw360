name: SW360 Build and Test

on:
  pull_request:
    branches:
      - main
      - feat/licensedb/integration
    paths-ignore:
      - third-party/**
      - Dockerfile
      - docker_build.sh
      - .github/sw360_container.yml
      - .github/thrift_container.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COUCHDB_USER: sw360
  COUCHDB_PASSWORD: sw360fossie
  THRIFT_VERSION: "0.20.0"

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04

    services:
      couchdb:
        image: couchdb:3
        ports:
          - 5984:5984
        env:
          COUCHDB_USER: ${{ env.COUCHDB_USER }}
          COUCHDB_PASSWORD: ${{ env.COUCHDB_PASSWORD }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: webiny/action-conventional-commits@7f91b1595ca1951cdb671ddc9f07a49081ec5b69 # v1.4.2

      - name: Verify license headers
        run: |
          chmod +x .github/testForLicenseHeaders.sh
          bash .github/testForLicenseHeaders.sh

      - name: Update properties with DB credentials
        run: |
          sudo mkdir -p /etc/sw360
          sudo cp ./build-configuration/test-resources/couchdb-test.properties /etc/sw360/
          sudo sed -i 's/^couchdb.user\s*=/& '${COUCHDB_USER}'/' /etc/sw360/couchdb-test.properties
          sudo sed -i 's/^couchdb.password\s*=/& '${COUCHDB_PASSWORD}'/' /etc/sw360/couchdb-test.properties

      - name: Copy test configuration files
        run: |
          sudo cp ./build-configuration/resources/orgmapping.properties /etc/sw360/

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: "21"
          distribution: "temurin"
          check-latest: true

      - name: Cache Thrift
        id: cache-thrift
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ${{ github.workspace }}/dist/thrift-${{ env.THRIFT_VERSION }}
          key: ${{ runner.os }}-thrift-${{ env.THRIFT_VERSION }}
          restore-keys: |
            ${{ runner.os }}-thrift-${{ env.THRIFT_VERSION }}

      - name: Install Thrift
        if: steps.cache-thrift.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq build-essential libevent-dev libtool flex bison pkg-config libssl-dev git cmake
          chmod +x third-party/thrift/install-thrift.sh
          DESTDIR=${{ github.workspace }}/dist/thrift-${{ env.THRIFT_VERSION }} third-party/thrift/install-thrift.sh

      - name: Build SW360 (compile only)
        run: |
          export PATH=$PATH:${{ github.workspace }}/dist/thrift-${{ env.THRIFT_VERSION }}/usr/local/bin
          mvn clean install \
            --no-transfer-progress \
            -P deploy -Dhelp-docs=true \
            -Dbase.deploy.dir=${PWD}/deploy \
            -DskipTests \
            -Dmaven.plugin.validation=VERBOSE

      - name: Run ArchUnit Architecture Tests
        id: archunit-tests
        continue-on-error: false
        run: |
          mvn -pl rest/resource-server test \
            -Dtest="org.eclipse.sw360.rest.resourceserver.architecture.*Test" \
            -Dbase.deploy.dir=${PWD}/deploy

      - name: Publish Architecture Tests Results
        if: always()
        run: |
          if [ "${{ steps.archunit-tests.outcome }}" = "success" ]; then
            echo "## ✅ Architecture Tests" >> $GITHUB_STEP_SUMMARY
            echo "All architecture constraints verified." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Architecture Violations Detected" >> $GITHUB_STEP_SUMMARY
            echo "Review logs for constraint violations that must be fixed before merge." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Run Unit and Integration Tests
        continue-on-error: false
        run: |
          mvn test \
            --no-transfer-progress \
            -Dbase.deploy.dir=${PWD}/deploy \
            -DRunComponentVisibilityRestrictionTest=false \
            -DRunPrivateProjectAccessTest=false \
            -DRunRestForceUpdateTest=false \
            -Dsurefire.excludes="**/architecture/*Test.java" \
            jacoco:report \
            -fae

      - name: Extract Test Results
        id: unit-tests
        if: always()
        run: |
          TESTS=N/A
          FAILURES=N/A
          SKIPPED=N/A
          FILES=$(find . -path "*/target/surefire-reports/TEST-*.xml")
          if [ -n "$FILES" ]; then
            TOTAL=$(grep -h "tests=\"" $FILES | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{sum+=$1} END {print sum}')
            FAILED=$(grep -h "failures=\"" $FILES | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{sum+=$1} END {print sum}')
            ERROR=$(grep -h "errors=\"" $FILES | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{sum+=$1} END {print sum}')
            SKIPPED=$(grep -h "skipped=\"" $FILES | sed 's/.*skipped="\([0-9]*\)".*/\1/' | awk '{sum+=$1} END {print sum}')
            FAILED=$((FAILED + ERROR))
          fi
          echo "unit_tests_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "unit_tests_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "unit_tests_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Run PrivateProjectAccessTest
        run: |
          mvn install -pl :build-configuration -am -Dbase.deploy.dir=.
          mvn -pl :datahandler test -Dtest=ProjectPermissionsVisibilityTest -DRunPrivateProjectAccessTest=true -DRunRestForceUpdateTest=true -Dbase.deploy.dir=. jacoco:report

      - name: Run BulkReleaseDeletingTest
        run: |
          mvn -pl :backend-components test -Dtest=BulkDeleteUtilTest -DRunPrivateProjectAccessTest=true -DRunBulkReleaseDeletingTest=true -Dbase.deploy.dir=. jacoco:report

      - name: Publish Test Results Summary
        if: always()
        run: |
          TOTAL="${{ steps.unit-tests.outputs.unit_tests_total }}"
          FAILED="${{ steps.unit-tests.outputs.unit_tests_failed }}"
          SKIPPED="${{ steps.unit-tests.outputs.unit_tests_skipped }}"

          echo "## ✅ Unit and Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total Tests Run | ${TOTAL:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Failed | ${FAILED:-N/A} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests Skipped | ${SKIPPED:-N/A} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload JaCoCo Reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: "**/target/site/jacoco/"
          retention-days: 7

      - name: Publish Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Workflow Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Workflow Status: FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the pipeline logs for details on any failures." >> $GITHUB_STEP_SUMMARY
