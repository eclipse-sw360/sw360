name: SW360 Container

on:
  schedule:
    - cron: '0 0 * * *' # Midnight
  workflow_dispatch:
  pull_request:
    paths:
      - 'Dockerfile'
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read

jobs:
  sw360_version:
    name: SW360 Version
    runs-on: ubuntu-24.04
    outputs:
      sw360_version: ${{ steps.pom_version.outputs.SW360_VERSION }}
      timestamp: ${{ steps.pom_version.outputs.TIMESTAMP }}
      keycloak_version: ${{ steps.pom_version.outputs.KEYCLOAK_VERSION }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout main repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '21'
          cache: 'maven'
          distribution: 'temurin'

      - name: Get revision from pom.xml
        id: pom_version
        run: |
          echo "SW360_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"
          echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"
          KEYCLOAK_VERSION=$(grep -oP '^FROM quay\.io/keycloak/keycloak:\K[0-9]+\.[0-9]+\.[0-9]+' Dockerfile | head -1)
          if [ -z "$KEYCLOAK_VERSION" ]; then
            echo "Failed to extract Keycloak base image version from Dockerfile" >&2
            exit 1
          fi
          echo "KEYCLOAK_VERSION=$KEYCLOAK_VERSION" >> "$GITHUB_OUTPUT"

  sw360_image:
    name: SW360 Runtime image
    needs: [sw360_version]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      id-token: write
    env:
      SW360_VERSION: ${{ needs.sw360_version.outputs.sw360_version }}
      TIMESTAMP: ${{ needs.sw360_version.outputs.timestamp }}
      KEYCLOAK_VERSION: ${{ needs.sw360_version.outputs.keycloak_version }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout main repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Extract components metadata (tags, labels) runtime image
        id: meta_sw360
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=schedule,pattern=nightly
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=sha,enable=true,prefix=sha-,format=short
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.licenses=EPL-2.0
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Extract components metadata (tags, labels) KeyCloak image
        id: meta_keycloak
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ github.repository }}/keycloak
          tags: |
            type=schedule,pattern=nightly
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=${{ env.KEYCLOAK_VERSION }},enable=true
          labels: |
            org.opencontainers.image.licenses=EPL-2.0
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: SW360 image
        id: build_sw360
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: sw360
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta_sw360.outputs.tags }}
          labels: ${{ steps.meta_sw360.outputs.labels }}
          provenance: mode=max
          sbom: true
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}

      - name: KeyCloak image
        id: build_keycloak
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: keycloak
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta_keycloak.outputs.tags }}
          labels: ${{ steps.meta_keycloak.outputs.labels }}
          provenance: mode=max
          sbom: true
        env:
          SOURCE_DATE_EPOCH: ${{ env.TIMESTAMP }}

      - name: Sign the images
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta_sw360.outputs.tags }}
          DIGEST: ${{ steps.build_sw360.outputs.digest }}
          KC_TAGS: ${{ steps.meta_keycloak.outputs.tags }}
          KC_DIGEST: ${{ steps.build_keycloak.outputs.digest }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          for tag in ${KC_TAGS}; do
            images+="${tag}@${KC_DIGEST} "
          done
          cosign sign --yes ${images}
